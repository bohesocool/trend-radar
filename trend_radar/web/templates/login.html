<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendRadar — 登录</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <style>
    :root {
      --bg: #08090a; --bg-card: #0f1011; --bg-elevated: #191a1b;
      --border: rgba(255,255,255,0.08); --border-subtle: rgba(255,255,255,0.05);
      --text: #f7f8f8; --text-secondary: #d0d6e0; --text-tertiary: #8a8f98; --text-quaternary: #62666d;
      --brand: #5e6ad2; --accent: #7170ff; --accent-hover: #828fff; --danger: #f85149;
      --surface-input: rgba(255,255,255,0.02);
      --surface-btn: rgba(255,255,255,0.02);
      --surface-btn-hover: rgba(255,255,255,0.05);
    }
    [data-theme="light"] {
      --bg: #f7f8f8; --bg-card: #ffffff; --bg-elevated: #f3f4f5;
      --border: #e6e6e6; --border-subtle: rgba(0,0,0,0.06);
      --text: #171717; --text-secondary: #5d5d5d; --text-tertiary: #8a8f98; --text-quaternary: #b4b8bf;
      --brand: #5e6ad2; --accent: #7170ff; --accent-hover: #4c5bce; --danger: #d4380d;
      --surface-input: rgba(0,0,0,0.02);
      --surface-btn: rgba(0,0,0,0.02);
      --surface-btn-hover: rgba(0,0,0,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-feature-settings: "cv01", "ss03";
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; width: 100%; max-width: 420px; text-align: center;
    }
    .login-logo { font-size: 40px; margin-bottom: 16px; }
    .login-title { font-size: 28px; font-weight: 600; letter-spacing: -0.704px; margin-bottom: 8px; }
    .login-subtitle { color: var(--text-tertiary); font-size: 15px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .form-input {
      width: 100%; background: var(--surface-input); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; color: var(--text);
      font-family: inherit; font-size: 15px;
      transition: border-color 0.2s; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-quaternary); }
    .login-btn {
      width: 100%; background: var(--surface-btn); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px; font-size: 15px; font-weight: 500; cursor: pointer;
      transition: background 0.2s, border-color 0.2s; font-family: inherit;
    }
    .login-btn:hover { background: var(--surface-btn-hover); border-color: var(--accent); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--danger); font-size: 14px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <script>
    (function() {
      var t = localStorage.getItem('trendradar_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <div class="login-card">
    <div class="login-logo">🔭</div>
    <h1 class="login-title">TrendRadar</h1>
    <p class="login-subtitle">GitHub 趋势 + AI 资讯雷达</p>
    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password-input" placeholder="输入访问密码" autocomplete="off">
      </div>
      <button type="submit" class="login-btn" id="login-btn">登录 →</button>
      <div class="login-error" id="error-msg"></div>
    </form>
  </div>
  <script>
    const existingToken = localStorage.getItem('trendradar_jwt');
    if (existingToken) { window.location.href = '/'; }

    function handleLogin(event) {
      event.preventDefault();
      const password = document.getElementById('password-input').value;
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.textContent = '验证中...';

      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password })
      })
      .then(resp => resp.json().then(data => ({ status: resp.status, data })))
      .then(({ status, data }) => {
        if (status === 200 && data.token) {
          localStorage.setItem('trendradar_jwt', data.token);
          window.location.href = '/';
        } else {
          errorEl.textContent = data.detail || '密码错误';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '登录 →';
        }
      })
      .catch(() => {
        errorEl.textContent = '网络错误，请重试';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录 →';
      });
      return false;
    }
  </script>
</body>
</html>
