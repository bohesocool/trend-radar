<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendRadar — 项目建议详情</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
</head>
<body>
  <script>
    (function() {
      var t = localStorage.getItem('trendradar_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <aside class="sidebar">
    <div class="sidebar-logo">🔭 TrendRadar</div>
    <nav>
      <a href="/" class="nav-link" data-page="dashboard">📊 仪表盘</a>
      <a href="/trends" class="nav-link" data-page="trends">📈 趋势详情</a>
      <a href="/suggestions" class="nav-link active" data-page="suggestions">🚀 项目建议</a>
      <a href="/archive" class="nav-link" data-page="archive">📚 历史报告</a>
      <a href="/settings" class="nav-link" data-page="settings">⚙️ 设置</a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
      <button class="logout-btn" id="logout-btn" style="margin-top:8px;">登出</button>
    </div>
  </aside>
  <main class="main-content">
    <div id="content"><div class="loading-state"><div class="loading-spinner"></div><p>加载中...</p></div></div>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
